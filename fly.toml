# fly.io application configuration.
# Generated for chaumstar; tweak `app` and `primary_region` before first deploy.
#
# Free-tier defaults:
#   - single shared-cpu-1x machine, 256 MB RAM
#   - auto-stop when idle, auto-start on incoming traffic
#   - HTTPS forced

app = "chaumstar"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/api/v1/health"
  protocol = "http"
  timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
